spring.datasource.url=jdbc:mysql://localhost:3306/roomly
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.show-sql=true
server.port=8080
# JWT configuration: secret key and token expiration (ms)
# IMPORTANT: usa una clave de al menos 32 bytes (256 bits) para HMAC-SHA.
# En producción carga esto por variable de entorno, no lo guardes en el repo.
jwt.secret=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
jwt.expiration=3600000